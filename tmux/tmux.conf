set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g window-style 'bg=default'
set -g window-active-style 'bg=default'
setw -g mouse on
set -g set-clipboard on
set -g focus-events on
set -g status-left-length 50
set -g status-left "[#{=/-40/…:session_name}] "

#bind-key t display-popup -E -d "#{pane_current_path}" -w 80% -h 80%


# For modern tmux (3.1+)
bind t split-window -v -l 30% -c "#{pane_current_path}"
bind C-s split-window -v -l 30% -c "#{pane_current_path}" "tmux-sessionizer"

run '~/.config/tmux/plugins/tpm/tpm'
